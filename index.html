<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Driver Grid - Sandbox Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Style for the custom simulated taxi map labels */
        .sim-taxi-vector-icon {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffcc00;
            border-radius: 6px;
            text-align: center;
            line-height: 22px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="admin-panel" style="position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(15, 15, 15, 0.95); border: 2px solid #ffcc00; padding: 15px; border-radius: 14px; color: white; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.75);">
        <strong style="color: #ffcc00; display: block; margin-bottom: 8px; text-align: center; letter-spacing: 1px; font-size: 14px;">🎛️ ADMIN APP CONTROLS</strong>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="font-size: 13px;">Alert Radius: <span id="radius-val" style="font-weight: bold; color: #34c759; font-size: 15px;">10</span> km</label>
            <input type="range" id="radius-slider" min="1" max="25" value="10" style="width: 60%; cursor: pointer;" oninput="updateAdminRadius(this.value)">
        </div>
        <div style="font-size: 10px; color: #aaa; text-align: center; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px;">
            Simulating local vs wide-area filtering logic live.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Global variables for tracking coordinates
        let map;
        let vehiclePos = { lat: 49.2611, lng: -123.1281 }; // Centered near central Vancouver
        let currentAddressData = { houseNumber: "", streetName: "" };
        
        let simulatedTaxis = [];
        let simMarkersMap = {}; 
        let adminAlertRadiusKm = 10; // Default admin benchmark setting

        // Initialize Map Layout
        function initMap() {
            map = L.map('map', {
                zoomControl: false 
            }).setView([vehiclePos.lat, vehiclePos.lng], 13);

            // Load high-contrast dark tactical map tiles
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(map);

            // Add your own vehicle marker
            const myIcon = L.divIcon({
                className: 'my-vehicle-icon',
                html: '<div style="width:12px; height:12px; background:#34c759; border:2px solid white; border-radius:50%;"></div>',
                iconSize: [12, 12]
            });
            L.marker([vehiclePos.lat, vehiclePos.lng], { icon: myIcon }).addTo(map).bindPopup("Your Taxi Location");
        }

        // Admin function to update operational radius live from screen slider
        function updateAdminRadius(val) {
            adminAlertRadiusKm = parseInt(val);
            document.getElementById('radius-val').innerText = val;
            console.log(`[ADMIN] Filtering boundary recalibrated to: ${adminAlertRadiusKm} KM`);
        }

        // Mathematical Formula: Calculates precise distance in kilometers between two GPS nodes
        function calculateDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the earth in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; 
        }

        // Fallback function to generate map markers visually if alert drops clear validation
        function createCautionMarkerOnMap(type, direction, latlng) {
            const cautionIcon = L.divIcon({
                html: `<div style="background:#ff3b30; color:white; padding:4px 8px; border-radius:4px; font-size:11px; font-weight:bold; border:1px solid white; white-space:nowrap;">⚠️ ${type} (${direction})</div>`,
                className: 'alert-caution-marker',
                iconAnchor: [25, 10]
            });
            
            const marker = L.marker([latlng.lat, latlng.lng], { icon: cautionIcon }).addTo(map);
            marker.bindPopup(`<b>${type} Alert</b><br>Direction: ${direction}<br>Location: ${currentAddressData.houseNumber} ${currentAddressData.streetName}`).openPopup();
        }

        // =========================================================================================
        // 🚀 LIVE SANDBOX SIMULATOR ENGINE (WITH ADAPTIVE DATA FILTERING)
        // =========================================================================================
        function initTaxiSimulator() {
            console.log("Sandbox Engine Online: Generating Scattered Fleet Coordinates...");

            // Generate 10 vehicles scattered wider (Vancouver core, Burnaby, Richmond, North Van)
            simulatedTaxis = Array.from({ length: 10 }, (_, i) => {
                const idNum = i + 1;
                // Give some taxis a much wider spread factor to test out the distance filters
                const spreadFactorLat = idNum > 5 ? 0.16 : 0.02; 
                const spreadFactorLng = idNum > 5 ? 0.22 : 0.02;

                return {
                    id: `sim_cab_${idNum}`,
                    label: `YC${100 + idNum}`,
                    lat: vehiclePos.lat + (Math.random() - 0.5) * spreadFactorLat,
                    lng: vehiclePos.lng + (Math.random() - 0.5) * spreadFactorLng,
                    speed: 0.00012 
                };
            });

            // Loop 1: Animate simulated cars smoothly across coordinates
            setInterval(() => {
                simulatedTaxis.forEach(taxi => {
                    taxi.lat += (Math.random() - 0.5) * taxi.speed;
                    taxi.lng += (Math.random() - 0.5) * taxi.speed;
                    updateSimulatedMarkerOnMap(taxi);
                });
            }, 3500);

            // Loop 2: Random taxi triggers a system alert. ONLY nearby cars pass validation rules!
            setInterval(() => {
                if (simulatedTaxis.length === 0 || !vehiclePos) return;

                // Pick an arbitrary driver profile out of the generated cluster
                const reportingTaxi = simulatedTaxis[Math.floor(Math.random() * simulatedTaxis.length)];
                const alertPos = L.latLng(reportingTaxi.lat, reportingTaxi.lng);

                // Run data protection check: Is the alert dropped inside or outside our filter rules?
                const distanceToMe = calculateDistanceKm(vehiclePos.lat, vehiclePos.lng, alertPos.lat, alertPos.lng);

                console.log(`[NETWORK EVENT] Cab ${reportingTaxi.label} dropped a packet ${distanceToMe.toFixed(1)} km away.`);

                // ADMIN CRITERIA RULE: If distance exceeds slider boundary, drop packet to preserve data limits!
                if (distanceToMe <= adminAlertRadiusKm) {
                    console.log(`[DATA PASSED] Incoming alert verified inside the ${adminAlertRadiusKm}km operational radius.`);
                    
                    const directions = ['Northbound', 'Southbound', 'Eastbound', 'Westbound'];
                    const randomDirection = directions[Math.floor(Math.random() * directions.length)];
                    
                    // Cache existing values to perform reverse lookup
                    const oldHouse = currentAddressData.houseNumber;
                    const oldStreet = currentAddressData.streetName;

                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${alertPos.lat}&lon=${alertPos.lng}&zoom=18`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.address) {
                                currentAddressData.streetName = data.address.road || data.address.pedestrian || "Main Thoroughfare";
                                currentAddressData.houseNumber = data.address.house_number || "";
                            }
                            
                            // Render marker since it successfully cleared our radius thresholds
                            createCautionMarkerOnMap('Heavy traffic', randomDirection, alertPos);

                            setTimeout(() => {
                                currentAddressData.houseNumber = oldHouse;
                                currentAddressData.streetName = oldStreet;
                            }, 2000);
                        }).catch(() => {
                            createCautionMarkerOnMap('Heavy traffic', randomDirection, alertPos);
                        });
                } else {
                    console.log(`[DATA BLOCKED] Ping dropped completely. Target falls outside your current ${adminAlertRadiusKm}km threshold.`);
                }
            }, 12000); // Triggers every 12 seconds in sandbox mode for faster testing
        }

        // Render moving vector graphics on screen for simulated fleet members
        function updateSimulatedMarkerOnMap(taxi) {
            const customHtml = `<div style="font-weight:900; font-size:10px; color:#ffcc00;">${taxi.label}</div>`;
            const simIconStyle = L.divIcon({
                className: 'sim-taxi-vector-icon',
                html: customHtml,
                iconSize: [50, 24],
                iconAnchor: [25, 12]
            });

            if (!simMarkersMap[taxi.id]) {
                simMarkersMap[taxi.id] = L.marker([taxi.lat, taxi.lng], { icon: simIconStyle }).addTo(map);
                simMarkersMap[taxi.id].bindPopup(`<strong>Active Fleet Node</strong><br>Unit: ${taxi.label}`);
            } else {
                simMarkersMap[taxi.id].setLatLng([taxi.lat, taxi.lng]);
            }
        }

        // Initialize script dependencies synchronously on load
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            initTaxiSimulator();
        });
    </script>
</body>
</html>
